<!DOCTYPE html>

    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="stylesheet" href="/css/daodejing-styles.css">
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .notfound-container {
            text-align: center;
            padding: 60px 20px 20px;
            max-width: 560px;
            width: 100%;
        }

        /* 慧惠叶子图标 */
        .huihui-icon-wrap {
            display: inline-block;
            width: 100px;
            height: 100px;
            margin-bottom: 24px;
        }

        .huihui-icon-outer {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: radial-gradient(circle at 45% 40%, rgba(58, 122, 106, 0.18) 0%, rgba(46, 95, 95, 0.10) 40%, rgba(212, 201, 168, 0.08) 70%, transparent 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            animation: huihui-breathe 5s ease-in-out infinite;
        }

        .huihui-icon-inner {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: radial-gradient(circle at 50% 40%, rgba(46, 95, 95, 0.22) 0%, rgba(46, 95, 95, 0.08) 50%, transparent 70%);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .huihui-icon-inner svg {
            width: 44px;
            height: 44px;
            fill: none;
            stroke: #2e5f5f;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            opacity: 0.8;
        }

        @keyframes huihui-breathe {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.05);
            }
        }

        .notfound-code {
            font-size: 5em;
            font-weight: 700;
            color: #d4c9a8;
            line-height: 1;
            margin: 0 0 8px;
            letter-spacing: 6px;
        }

        .notfound-title {
            font-size: 1.6em;
            font-weight: 700;
            color: #2e5f5f;
            margin: 0 0 16px;
            letter-spacing: 2px;
        }

        .notfound-message {
            font-size: 1em;
            color: #666;
            line-height: 1.9;
            margin: 0 0 30px;
        }

        .notfound-message .highlight {
            color: #2e5f5f;
            font-weight: 600;
        }

        /* 导航建议卡片 */
        .notfound-links {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin-bottom: 36px;
        }

        .notfound-links a {
            display: inline-block;
            padding: 10px 24px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 0.95em;
            transition: all 0.2s;
            border: 1.5px solid #2e5f5f;
            color: #2e5f5f;
            background: #fff;
        }

        .notfound-links a:hover {
            background: #2e5f5f;
            color: #fff;
        }

        .notfound-links a.primary {
            background: #2e5f5f;
            color: #fff;
        }

        .notfound-links a.primary:hover {
            background: #4a7878;
            border-color: #4a7878;
        }

        /* 搜索栏 */
        .notfound-search {
            max-width: 460px;
            width: 100%;
            margin: 0 auto 40px;
            padding: 0 20px;
        }

        .notfound-search .daodejing-search {
            max-width: 100%;
            margin: 0;
        }

        .notfound-search .daodejing-search input[type="search"] {
            font-size: 0.95em;
            padding: 12px 16px;
            border-radius: 8px;
        }

        /* 页脚 */
        .site-footer {
            text-align: center;
            padding: 20px;
            color: #aab8b0;
            font-size: 0.85em;
            line-height: 1.8;
        }

        @media (max-width: 480px) {
            .notfound-code {
                font-size: 3.5em;
            }

            .notfound-title {
                font-size: 1.3em;
            }

            .notfound-links {
                gap: 8px;
            }

            .notfound-links a {
                padding: 8px 18px;
                font-size: 0.9em;
            }
        }
    </style>
</head>

<body>
