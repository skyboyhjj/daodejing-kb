1.3 CI/CD 流水线
GitHub Actions (.github/workflows/ci.yml)：
yaml
触发条件:
  - push/PR to main
  - 仅当修改: chapters/**, data/**, scripts/**
执行:
  ① node scripts/validate.js    # 81 章结构检查
  ② node scripts/build-index.js --check   # 索引是否过期
触发范围窄：只有 chapters/、data/、scripts/ 变更才触发。JS/CSS/HTML 页面级改动不触发。
不做部署：CI 只做检查，不涉及发布。
不做自动修复：--check 模式只报告索引过期，不自动重建。
