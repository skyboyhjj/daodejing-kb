二、已识别风险和问题
🔴 高风险
1. 代码严重重复
函数	副本数	位置
buildSystemPrompt()	3	api/chat.js:76-119, functions/api/chat.js:95-138, server.js:39-82
sendFeedbackEmail()	3	api/chat.js:122-148, functions/api/chat.js:141-167, server.js:376-401
修改 System Prompt 或反馈逻辑需要同步改 3 个文件，已出现过遗漏（functions/api/chat.js 的反馈功能是最晚加的）。2. 无 Secret 扫描/泄露防护
.env 和 .dev.vars 已 gitignored，但没有 pre-commit hook
没有 .env.example 自动对比检查
RESEND_API_KEY 曾被明文贴在聊天记录中
没有 GitHub Secret Scanning 启用
3. 无自动化测试
仅 scripts/validate.js 做 HTML 结构检查（9 项），无逻辑测试
无 API 测试（/api/chat 从未在 CI 中被调用）
无前端功能测试（搜索、聊天、层级过滤）
scripts/test-search.js（48 条搜索测试）只在本地手动运行
🟡 中风险
4. 分支策略缺失 — "主干裸奔"所有开发直接提交 main，没有 feature 分支、没有 PR review。一旦推送错误代码，直接进入生产（Cloudflare Pages 自动部署）。5. Vercel 部署长期未同步最后一次手动 vercel deploy 时间不明。如果 huihui-skill.org 上仍有用户，他们拿到的是过时版本。6. 环境变量管理分散
