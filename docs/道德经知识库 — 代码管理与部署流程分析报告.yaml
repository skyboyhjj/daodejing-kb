三、改进建议
3.1 分支管理策略（立即执行）
plaintext
建议分支模型（简化 GitFlow）：

main          ← 生产分支，CF Pages 自动部署
  ↑ PR merge
feature/*     ← 功能开发分支
fix/*         ← Bug 修复分支
chore/*       ← 配置/文档变更分支
具体措施：
保护 main 分支（GitHub Settings → Branches → Branch protection）：
禁止直接 push 到 main
要求 PR 通过 CI 才能 merge
要求至少 1 个 review（在有多人协作时）
Feature 分支命名规范：
plaintext
feature/huhui-feedback-01    # 对应任务编号
fix/search-defer-404         # 描述问题和修复
chore/update-vercel-docs     # 非功能变更
PR 模板（.github/pull_request_template.md）：
markdown
## 变更说明
## 测试方式
## 影响范围
## 验收清单
3.2 消除代码重复（高优先级）
提取共享模块：
plaintext
新增: api/_shared/
  ├── system-prompt.js   ← buildSystemPrompt() 唯一版本
  ├── feedback-email.js  ← sendFeedbackEmail() 唯一版本
  └── cors.js            ← CORS headers 统一
然后各文件从共享模块导入：
javascript
// api/chat.js
import { buildSystemPrompt } from './_shared/system-prompt.js';
import { sendFeedbackEmail } from './_shared/feedback-email.js';

// functions/api/chat.js
import { buildSystemPrompt } from '../../api/_shared/system-prompt.js';
import { sendFeedbackEmail } from '../../api/_shared/feedback-email.js';

// server.js
const { buildSystemPrompt } = require('./api/_shared/system-prompt.js');
const { sendFeedbackEmail } = require('./api/_shared/feedback-email.js');
注意：Cloudflare Pages Functions 对 ES Module import 路径有限制（只能导入同目录或子目录）。functions/api/chat.js 可能需要用 copy 或 symlink 方式引用共享模块，或改用内联 bundling。
3.3 CI 扩展（高优先级）
当前 CI：
yaml
触发: chapters/**, data/**, scripts/**
执行: validate.js + build-index.js --check
建议扩展：
yaml
name: CI Quality Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-chapters:        # 现有：81章结构检查
  check-index:              # 现有：搜索索引是否过期
  
  # ↓ 新增 ↓
  
  lint-scripts:             # JS 语法检查（node --check）
    - run: for f in js/*.js api/*.js functions/api/*.js; do node --check $f; done

  test-search:              # 搜索功能测试
    - run: node scripts/test-search.js

  api-smoke-test:           # API 冒烟测试（需要测试环境变量）
    - run: |
        curl -sf -X POST https://test-api/chat \
          -H "Content-Type: application/json" \
          -d '{"messages":[{"role":"user","content":"道"}],"level":"L2"}'

  secret-scan:              # 密钥泄露扫描
    - uses: gitleaks/gitleaks-action@v2
关键点：
JS 语法检查最小化（node --check），零依赖
test-search.js 已有的 48 个测试集成到 CI
secret-scan 防止 API Key 误提交
CI 门禁通过后才允许 merge
3.4 环境变量与密钥管理
当前问题：三处配置（.env / .dev.vars / Dashboard），存在不同步风险。建议措施：
添加 .env.example 自动验证（script 或 CI 步骤）：
bash
# 检查 .env.example 中每个 VAR_NAME 是否在 .env 中配置
node scripts/check-env.js
Pre-commit Hook（.githooks/pre-commit）：
bash
# 阻止包含疑似 API Key 的提交
if git diff --cached | grep -E 'sk-[a-zA-Z0-9]{32,}'; then
  echo "❌ 检测到疑似 API Key，提交已阻止"
  exit 1
fi
Wrangler Secret 管理（如配置了 Cloudflare API Token）：
bash
npx wrangler pages secret put RESEND_API_KEY
# 替代手动 Dashboard 配置
Cloudflare Pages 部署时环境变量文档化：创建 docs/cloudflare-pages-env.md，列出所有需要的环境变量和配置方法。
3.5 部署流程规范化
建议采用"部署检查清单"代替"push 即部署"：
plaintext
开发完成
  ├─ 1. npm run validate        # 通过
  ├─ 2. npm run build:index     # 索引最新
  ├─ 3. npm test                # 测试通过
  ├─ 4. git diff --check        # 无意外文件
  ├─ 5. 创建 PR 到 main
  ├─ 6. CI 全绿
  └─ 7. Merge → CF Pages 自动部署
Vercel 处置：决定是否继续维护：
方案 A：正式下线 Vercel，DNS 重定向到 hui-skill.org，删除 api/chat.js（保留代码在 git 历史中）
方案 B：保留 Vercel 作为灾备，每次 CF Pages 发布后同步手动部署一次，或通过 GitHub Actions 自动同步
3.6 版本管理
语义化版本 + Git Tags：
bash
git tag -a v1.1.0 -m "feat: 5·12纪念功能 + 反馈修复"
git push --tags
自动生成 changelog（简单脚本）：
bash
npm run changelog  # 从 git log 提取 feat/fix 条目
版本号更新：重大功能发布时更新 package.json 中的 version
