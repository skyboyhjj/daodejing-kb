<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>亲子时光 · 慧惠陪你读《道德经》</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="stylesheet" href="css/daodejing-styles.css">
    <link rel="stylesheet" href="css/family.css">
</head>

<body>
    <!-- ═══════ 顶部导航 ═══════ -->
    <nav class="family-nav">
        <a href="./" class="family-nav-back">&larr; 返回首页</a>
        <span class="family-nav-title">🌿 亲子时光 · 慧惠陪你读《道德经》</span>
    </nav>

    <!-- P2 新增：学习模式切换（独立一行，不受导航栏空间限制） -->
    <div class="family-mode-bar" id="mode-switch">
        <button class="mode-segment active" data-mode="continuous">⏯ 连续学习</button>
        <button class="mode-segment" data-mode="free">🔍 自由探索</button>
    </div>

    <!-- ═══════ 主内容区 ═══════ -->
    <main class="family-main" id="family-main">

        <!-- 慧惠欢迎区（初始可见） -->
        <div class="huihui-welcome" id="huihui-welcome">
            <!-- 水墨叶子图标 -->
            <div class="huihui-avatar">
                <div class="huihui-avatar-outer">
                    <div class="huihui-avatar-inner">
                        <svg viewBox="0 0 50 50" xmlns="http://www.w3.org/2000/svg">
                            <path
                                d="M25 4 C18 10, 10 18, 10 28 C10 36, 16 44, 25 46 C34 44, 40 36, 40 28 C40 18, 32 10, 25 4Z" />
                            <path d="M25 12 L25 38" />
                            <path d="M18 22 C22 20, 28 20, 32 22" />
                        </svg>
                    </div>
                </div>
            </div>

            <!-- P2 新增：恢复提示（默认隐藏） -->
            <div class="resume-prompt" id="resume-prompt" style="display:none;">
                <div class="resume-prompt-title" id="resume-text"></div>
                <div class="resume-prompt-actions">
                    <button class="resume-btn" id="resume-continue-btn">🚀 继续学习</button>
                    <button class="resume-btn resume-btn-secondary" id="resume-reset-btn">🔄 重新开始</button>
                </div>
            </div>

            <!-- 欢迎消息（JS 动态填充） -->
            <div class="huihui-message" id="welcome-message"></div>

            <!-- 年龄选择按钮 -->
            <div class="age-selector" id="age-selector">
                <button class="age-btn" data-age="4-6">4 - 6 岁</button>
                <button class="age-btn" data-age="7-9">7 - 9 岁</button>
                <button class="age-btn" data-age="10-12">10 - 12 岁</button>
            </div>

            <!-- P2 新增：章节号输入（自由探索模式，默认隐藏） -->
            <div class="chapter-input-area" id="chapter-input-area" style="display:none;">
                <label class="chapter-input-label">📖 输入你想学的章节号（1 - 81）</label>
                <div class="chapter-input-row">
                    <input type="number" id="chapter-num-input" class="chapter-num-input" min="1" max="81"
                        placeholder="章节号">
                    <button id="chapter-input-btn" class="send-btn" style="min-height:44px;">开始学习</button>
                </div>
                <button class="browse-all-btn" id="browse-all-btn">📋 浏览全部 81 章 ▼</button>
            </div>
        </div>

        <!-- P2 新增：进度条（连续学习模式，默认隐藏） -->
        <div class="chapter-progress" id="chapter-progress" style="display:none;">
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill" style="width:0%;"></div>
            </div>
            <div class="progress-text" id="progress-text"></div>
        </div>

        <!-- 对话区 -->
        <div class="dialogue-area" id="dialogue-area"></div>

        <!-- 章节选择器（隐藏） -->
        <div class="chapter-selector" id="chapter-selector" style="display:none;">
            <div class="chapter-selector-title">🌿 选一个想聊的话题吧</div>
            <div class="chapter-cards" id="chapter-cards"></div>
        </div>

        <!-- 输入区 -->
        <div class="input-area" id="input-area">
            <textarea id="user-input" class="user-input" placeholder="输入孩子的回答……" rows="2" disabled></textarea>
            <div class="input-actions">
                <button id="send-btn" class="send-btn" disabled>发送</button>
                <div class="secondary-actions">
                    <button id="switch-topic-btn" class="action-btn action-btn-secondary">换一个话题</button>
                    <button id="end-session-btn" class="action-btn action-btn-secondary">今天就到这里</button>
                </div>
            </div>
        </div>

    </main>

    <!-- ═══════ 脚本 ═══════ -->
    <script src="js/family.js"></script>
</body>

</html>
